name: Refresh Twitch streams

# Polls Twitch Helix for live Dota 2 streams and commits the result.
#
# Schedule note: GitHub's cron minimum is technically every minute,
# but scheduled workflows are queued and can be dropped during busy
# periods. We schedule every 5 minutes on odd offsets instead of the
# common */5 marks. The frontend cache-busts the fetch, falls back to
# the latest committed GitHub JSON if the deployed Pages copy is older,
# and shows last-known cards if GitHub is late.

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch: # allow manual runs from the Actions tab

# Lets the workflow push the updated JSON back to the repo.
permissions:
  contents: write

concurrency:
  group: refresh-streams
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch streams
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          STREAM_FEED_TTL_MINUTES: 60
        run: node scripts/fetch-streams.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/streams.json; then
            echo "No change in streams.json - skipping commit."
            exit 0
          fi
          git add public/streams.json
          git commit -m "chore: refresh streams.json [skip ci]"
          git push
