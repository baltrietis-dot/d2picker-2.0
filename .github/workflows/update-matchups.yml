name: Update Matchup Data

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 3am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-matchups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest matchup data
        run: node scripts/prefetch_matchups.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/all_matchups.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/all_matchups.json
          git commit -m "chore: update matchup data"
          git push
